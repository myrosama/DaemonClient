name = "daemonclient-auth"
main = "src/index.ts"
compatibility_date = "2024-11-25"

# Custom domain: *.workers.dev is blocked/degraded on some mobile carriers
# (the old Samsung-503 root cause) — the landing page's session check must
# not depend on it.
routes = [
  { pattern = "auth.daemonclient.uz", custom_domain = true }
]

[vars]
FIREBASE_PROJECT_ID = "daemonclient-c0625"

# Set these as secrets: wrangler secret put SESSION_SECRET
# wrangler secret put FIREBASE_API_KEY
