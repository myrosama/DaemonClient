#
# DaemonClient × Immich — Custom Docker Compose
#
# This compose file runs a modified Immich server with Telegram-backed storage.
# Usage:
#   1. Copy .env.daemon to .env and fill in your Telegram credentials
#   2. docker compose -f docker/docker-compose.daemon.yml up -d
#

name: daemonclient-immich

services:
  immich-server:
    container_name: daemonclient_server
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ${UPLOAD_LOCATION:-./library}:/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - ../.env.daemon
    environment:
      # Pass through DaemonClient-specific env vars
      - DAEMON_BOT_TOKEN=${DAEMON_BOT_TOKEN}
      - DAEMON_CHANNEL_ID=${DAEMON_CHANNEL_ID}
      - DAEMON_ZKE_PASSWORD=${DAEMON_ZKE_PASSWORD:-}
      - DAEMON_ZKE_SALT=${DAEMON_ZKE_SALT:-}
    ports:
      - '2283:2283'
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      disable: false

  # Machine learning is optional — comment out to save resources
  immich-machine-learning:
    container_name: daemonclient_ml
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    volumes:
      - model-cache:/cache
    env_file:
      - ../.env.daemon
    restart: always
    healthcheck:
      disable: false

  redis:
    container_name: daemonclient_redis
    image: docker.io/valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  database:
    container_name: daemonclient_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_DB: ${DB_DATABASE_NAME:-immich}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION:-./postgres}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    healthcheck:
      disable: false

volumes:
  model-cache:
